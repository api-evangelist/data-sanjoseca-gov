aid: data-sanjoseca-gov
name: City of San Jose
description: >-
  City of San Jose is a open data portal open-data portal for United States running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 170 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.

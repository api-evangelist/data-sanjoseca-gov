apis:
  - aid: data-sanjoseca-gov:catalog
    name: City of San Jose CKAN Action API
    description: >-
      CKAN Action API for City of San Jose, a consistent JSON-over-HTTP interface over a catalog of 170 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://data.sanjoseca.gov/api/3/action/.
    humanURL: https://data.sanjoseca.gov
